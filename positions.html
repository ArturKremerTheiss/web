<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{border: 1px solid rgb(236, 56, 56);margin: 0px;padding: 0px;}
        .box{display:inline-block;
            width: 100px;
            height: 100px;
            border-color:  black;}      
        #box1{background-color: hotpink;}
        #box2{background-color: blue;}
        #box3{background-color: green;}
        #box4{background-color: yellow;}
        #box5{background-color: black;}
        span:last-child{background-color: red;}
    </style>
</head>
<body>
    <div id="container">  
    <div id="box1" class="box">1</div>
    <div id="box2" class="box">2</div>
    <div id="box3" class="box">3</div>
    <div id="box4" class="box">4</div>
    <div id="box5" class="box">5</div>
        <span class="box">6</span>

    </div>
</body>
</html>
